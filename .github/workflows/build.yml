name: build-and-deploy
on:
  schedule:
    - cron: "17 * * * *"   # every hour at :17
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build site
        run: python3 generate.py
      - name: Commit refreshed snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add prices.json site/
          git diff --cached --quiet || git commit -m "chore: hourly price refresh"
          git push || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
  ping:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: IndexNow ping (Bing + Yandex + Seznam + Naver + Yep)
        run: |
          KEY=c9f1a8b7d6e5c4b3a2918273645f0e9d
          HOST=planetapokera.github.io
          curl -sS -X POST "https://api.indexnow.org/IndexNow" \
            -H 'Content-Type: application/json' \
            -d "{\"host\":\"${HOST}\",\"key\":\"${KEY}\",\"keyLocation\":\"https://${HOST}/crypto-prices-live/${KEY}.txt\",\"urlList\":[\"https://${HOST}/crypto-prices-live/sitemap.xml\"]}" \
            -w "\nstatus=%{http_code}\n" || true
